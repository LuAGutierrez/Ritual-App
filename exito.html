<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Listo — Ritual</title>
  <meta name="description" content="Cuenta lista en Ritual." />
  <meta property="og:title" content="Listo — Ritual" />
  <meta property="og:description" content="Ya podés seguir con tus experiencias." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="https://ritual.app/og/ritual-og.jpg" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Listo — Ritual" />
  <meta name="twitter:description" content="Ya podés seguir con tus experiencias." />
  <meta name="twitter:image" content="https://ritual.app/og/ritual-og.jpg" />
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="js/tailwind-config.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="dark bg-ink text-nude font-body antialiased min-h-screen">
  <header class="fixed top-0 left-0 right-0 z-50 border-b border-white/5 bg-ink/80 backdrop-blur-sm pl-[env(safe-area-inset-left)] pr-[env(safe-area-inset-right)]">
    <nav class="max-w-5xl mx-auto px-4 sm:px-6 py-3 sm:py-4 flex items-center justify-between">
      <a href="index.html" class="font-display text-2xl font-semibold text-nude">Ritual</a>
    </nav>
  </header>

  <main class="min-h-screen flex flex-col justify-center px-4 sm:px-6 pt-20 pb-16 max-w-md mx-auto text-center">
    <p class="text-wine text-sm uppercase tracking-wider mb-4" id="exito-etiqueta">Listo</p>
    <h1 class="font-display text-3xl sm:text-4xl text-nude mb-6" id="exito-titulo">Registro exitoso</h1>
    <p class="text-nude-muted text-sm sm:text-base mb-10">Elegí una experiencia y probala cuando quieras.</p>
    <a href="mis-experiencias.html" id="btn-continuar" class="touch-target inline-flex items-center justify-center rounded-full bg-wine px-10 py-4 text-nude font-medium hover:bg-wine-light transition min-h-[48px] no-underline">
      Probar los juegos
    </a>
  </main>

  <script>
    (function() {
      var params = new URLSearchParams(window.location.search);
      var tipo = params.get('tipo');
      var titulo = document.getElementById('exito-titulo');
      var etiqueta = document.getElementById('exito-etiqueta');
      if (tipo === 'login' && titulo) {
        titulo.textContent = 'Sesión iniciada';
        if (etiqueta) etiqueta.textContent = 'Bienvenido de nuevo';
        var btn = document.getElementById('btn-continuar');
        if (btn) btn.textContent = 'Ir a mis experiencias';
      } else if (titulo) {
        titulo.textContent = 'Registro exitoso';
        if (etiqueta) etiqueta.textContent = 'Cuenta creada';
      }
    })();
  </script>
</body>
</html>
